providers = ["node"]

[variables]
  NIXPACKS_NODE_VERSION = "22.16.0"

[phases.install]
  # Forcing NODE_ENV=development ensures pnpm doesn't skip devDependencies during the cloud build
  cmds = ["NODE_ENV=development pnpm install --no-frozen-lockfile"]

[phases.build]
  # We manually inject the missing Linux binary so the temporary build executor doesn't crash
  cmds = [
    "pnpm add -w @rolldown/binding-linux-x64-gnu@1.0.0-rc.9 rolldown@1.0.0-rc.9",
    "pnpm build"
  ]

[start]
  cmd = "npx openclaw gateway --host 0.0.0.0 --port $PORT"
