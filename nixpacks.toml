providers = ["node"]

[variables]
  NIXPACKS_NODE_VERSION = "22"

[phases.setup]
  cmds = ["corepack enable", "corepack prepare pnpm@latest --activate"]

[phases.install]
  cmds = ["pnpm install"]

[phases.build]
  cmds = ["pnpm build"]

[start]
  cmd = "npx openclaw gateway --host 0.0.0.0 --port $PORT"
